<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secretary - Remote File Manager</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: External Scripts -->
<!-- BEGIN: Tailwind Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            macBackground: '#1a1a1a',
            macCard: '#252525',
            macAccent: '#007aff',
            macMuted: '#8e8e93',
            macBorder: '#3a3a3c'
          },
          borderRadius: {
            'mac': '12px'
          }
        }
      }
    }
  </script>
<!-- END: Tailwind Configuration -->
<!-- BEGIN: Custom Typography Styles -->
<style data-purpose="typography">
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .text-muted {
      color: #8e8e93;
    }
  </style>
<!-- END: Custom Typography Styles -->
<!-- BEGIN: Layout Styles -->
<style data-purpose="layout">
    .mac-card {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    input::placeholder {
      color: #555555;
    }
  </style>
<!-- END: Layout Styles -->
</head>
<body class="bg-macBackground flex items-center justify-center min-h-screen text-white">
<!-- BEGIN: Login Container -->
<main class="w-full max-w-sm px-4" data-purpose="login-container">
<div class="mac-card bg-macCard rounded-mac p-8 flex flex-col items-center">
<!-- BEGIN: Header Section -->
<section class="text-center mb-8" data-purpose="header">
<!-- App Icon -->
<div class="mb-4 flex items-center justify-center w-16 h-16 bg-macAccent rounded-2xl shadow-lg relative" data-purpose="app-icon">
<!-- Folder Icon SVG -->
<svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<!-- Chain Link Badge -->
<div class="absolute -bottom-1 -right-1 bg-white rounded-full p-1 border-2 border-macAccent">
<svg class="w-3 h-3 text-macAccent" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</div>
</div>
<h1 class="text-2xl font-bold tracking-tight">Secretary</h1>
<p class="text-muted text-sm mt-1">Mac Mini File Manager</p>
</section>
<!-- END: Header Section -->
<!-- BEGIN: Connection Form -->
<form class="w-full space-y-4" data-purpose="login-form" onsubmit="return false;">
<!-- Host & Port Grid -->
<div class="grid grid-cols-4 gap-3">
<div class="col-span-3">
<label class="block text-[10px] uppercase font-semibold text-muted mb-1 ml-1">Host</label>
<input class="w-full bg-[#1e1e1e] border-macBorder rounded-md text-sm focus:ring-macAccent focus:border-macAccent py-2" placeholder="kcy-macmini" type="text"/>
</div>
<div class="col-span-1">
<label class="block text-[10px] uppercase font-semibold text-muted mb-1 ml-1">Port</label>
<input class="w-full bg-[#1e1e1e] border-macBorder rounded-md text-sm focus:ring-macAccent focus:border-macAccent py-2 text-center" placeholder="22" type="text"/>
</div>
</div>
<!-- User Input -->
<div>
<label class="block text-[10px] uppercase font-semibold text-muted mb-1 ml-1">User</label>
<input class="w-full bg-[#1e1e1e] border-macBorder rounded-md text-sm focus:ring-macAccent focus:border-macAccent py-2" placeholder="kcy" type="text"/>
</div>
<!-- BEGIN: Auth Toggle (Segmented Control) -->
<div class="bg-[#1e1e1e] p-1 rounded-lg flex border border-macBorder" data-purpose="auth-tabs">
<button class="flex-1 text-xs py-1.5 rounded-md bg-macBorder shadow-sm font-medium" type="button">SSH Key</button>
<button class="flex-1 text-xs py-1.5 rounded-md text-muted font-medium hover:text-white transition-colors" type="button">Password</button>
</div>
<!-- END: Auth Toggle -->
<!-- SSH Key Path -->
<div class="flex gap-2">
<div class="relative flex-grow">
<input class="w-full bg-[#1e1e1e] border-macBorder rounded-md text-xs py-2 pr-2 overflow-hidden text-ellipsis" placeholder="~/.ssh/id_rsa" readonly="" type="text"/>
</div>
<button class="bg-macBorder hover:bg-[#4a4a4c] px-3 py-2 rounded-md text-xs font-medium transition-colors" type="button">Browse</button>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-macAccent hover:bg-blue-600 active:scale-[0.98] transition-all py-2.5 rounded-mac font-semibold text-sm shadow-lg" type="submit">
            Connect
          </button>
</div>
<!-- BEGIN: Status Indicator -->
<div class="flex items-center justify-center gap-2 pt-2" data-purpose="status-bar">
<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
<span class="text-[11px] text-muted font-medium">Disconnected</span>
</div>
<!-- END: Status Indicator -->
</form>
<!-- END: Connection Form -->
</div>
</main>
<!-- END: Login Container -->
</body></html>
